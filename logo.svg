<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 200" width="760" height="200" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <!-- Badge depth -->
    <radialGradient id="badge" cx="38%" cy="32%" r="80%">
      <stop offset="0%"  stop-color="#312e81"/>
      <stop offset="55%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0a0a23"/>
    </radialGradient>

    <!-- Trend line gradient -->
    <linearGradient id="trend" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%"   stop-color="#22d3ee"/>
      <stop offset="55%"  stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>

    <!-- Bars gradient -->
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"   stop-color="#4338ca" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0.9"/>
    </linearGradient>

    <!-- Wordmark sheen -->
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>

    <!-- Moving shimmer sweep -->
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate"
                        values="-1 0;1 0;1 0" dur="4.5s" repeatCount="indefinite"
                        keyTimes="0;0.4;1"/>
    </linearGradient>

    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <clipPath id="badgeClip">
      <rect x="20" y="40" width="120" height="120" rx="30"/>
    </clipPath>
  </defs>

  <!-- ===================== ICON ===================== -->
  <g>
    <!-- gentle float -->
    <animateTransform attributeName="transform" type="translate"
                      values="0 0;0 -2;0 0" dur="5s" repeatCount="indefinite"
                      calcMode="spline" keyTimes="0;0.5;1"
                      keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>

    <!-- Badge -->
    <rect x="20" y="40" width="120" height="120" rx="30" fill="url(#badge)"/>
    <rect x="20" y="40" width="120" height="120" rx="30" fill="none"
          stroke="#6366f1" stroke-width="1.6">
      <animate attributeName="stroke-opacity" values="0.25;0.9;0.25"
               dur="3s" repeatCount="indefinite"/>
    </rect>

    <g clip-path="url(#badgeClip)">
      <!-- Growing bars (the "workspace" / ledger) -->
      <g>
        <rect x="42"  y="130" width="14" height="0" rx="3" fill="url(#bar)">
          <animate attributeName="height" values="0;34"  dur="1s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.2 0.7 0.3 1"/>
          <animate attributeName="y"      values="130;96" dur="1s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.2 0.7 0.3 1"/>
        </rect>
        <rect x="64"  y="130" width="14" height="0" rx="3" fill="url(#bar)">
          <animate attributeName="height" values="0;54"  dur="1s" begin="0.35s" fill="freeze" calcMode="spline" keySplines="0.2 0.7 0.3 1"/>
          <animate attributeName="y"      values="130;76" dur="1s" begin="0.35s" fill="freeze" calcMode="spline" keySplines="0.2 0.7 0.3 1"/>
        </rect>
        <rect x="86"  y="130" width="14" height="0" rx="3" fill="url(#bar)">
          <animate attributeName="height" values="0;78"  dur="1s" begin="0.5s" fill="freeze" calcMode="spline" keySplines="0.2 0.7 0.3 1"/>
          <animate attributeName="y"      values="130;52" dur="1s" begin="0.5s" fill="freeze" calcMode="spline" keySplines="0.2 0.7 0.3 1"/>
        </rect>
        <rect x="108" y="130" width="14" height="0" rx="3" fill="url(#bar)">
          <animate attributeName="height" values="0;80"  dur="1s" begin="0.65s" fill="freeze" calcMode="spline" keySplines="0.2 0.7 0.3 1"/>
          <animate attributeName="y"      values="130;50" dur="1s" begin="0.65s" fill="freeze" calcMode="spline" keySplines="0.2 0.7 0.3 1"/>
        </rect>
      </g>

      <!-- Rising trend line that draws itself -->
      <polyline points="44,118 71,96 93,74 117,52"
                fill="none" stroke="url(#trend)" stroke-width="4.5"
                stroke-linecap="round" stroke-linejoin="round"
                stroke-dasharray="160" stroke-dashoffset="160" filter="url(#glow)">
        <animate attributeName="stroke-dashoffset" values="160;0"
                 dur="1.1s" begin="0.4s" fill="freeze"
                 calcMode="spline" keySplines="0.3 0.6 0.2 1"/>
      </polyline>

      <!-- Coin node at the tip ($ = financial) -->
      <g opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.4s" fill="freeze"/>
        <circle cx="117" cy="52" r="10" fill="#0a0a23" stroke="url(#trend)" stroke-width="2.5"/>
        <circle cx="117" cy="52" r="10" fill="none" stroke="#a78bfa" stroke-width="2.5">
          <animate attributeName="stroke-opacity" values="0.8;0;0.8" dur="2.2s" begin="1.4s" repeatCount="indefinite"/>
        </circle>
        <text x="117" y="52" text-anchor="middle" dy="0.35em"
              font-size="12" font-weight="800" fill="#e0e7ff">$</text>
      </g>
    </g>

    <!-- shimmer sweep over badge -->
    <rect x="20" y="40" width="120" height="120" rx="30" fill="url(#sheen)"
          clip-path="url(#badgeClip)" opacity="0.4"/>
  </g>

  <!-- ===================== WORDMARK ===================== -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.8s" begin="0.9s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate"
                      values="14 0;0 0" dur="0.8s" begin="0.9s" fill="freeze"
                      calcMode="spline" keySplines="0.2 0.7 0.3 1"/>

    <text x="172" y="98" font-size="50" font-weight="800" letter-spacing="-1.5"
          fill="url(#ink)">Freelance<tspan fill="#818cf8">OS</tspan></text>

    <!-- sheen swipe across wordmark -->
    <text x="172" y="98" font-size="50" font-weight="800" letter-spacing="-1.5"
          fill="url(#sheen)">FreelanceOS</text>

    <text x="174" y="128" font-size="17.5" font-weight="500" letter-spacing="2.3"
          fill="#8b93c9">UNIFIED FINANCIAL WORKSPACE FOR FREELANCERS</text>

    <!-- underline accent draws in -->
    <line x1="174" y1="112" x2="174" y2="112" stroke="url(#trend)" stroke-width="3" stroke-linecap="round">
      <animate attributeName="x2" values="174;512" dur="0.9s" begin="1.5s" fill="freeze"
               calcMode="spline" keySplines="0.2 0.7 0.3 1"/>
    </line>
  </g>
</svg>
